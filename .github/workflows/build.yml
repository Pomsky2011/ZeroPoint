name: Multi-Platform Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build (x64)
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # No vcpkgGitCommitId pin: this repo has no vcpkg.json, and the previous
    # pin (Nov 2023) had gone stale — MSYS2 mirrors had GC'd a package
    # version its era of the sdl2 port depended on, and its vcpkg-cmake
    # helper scripts predated solid arm64-windows toolchain detection.
    # Floating to vcpkg's current default branch avoids re-pinning to
    # another commit that will eventually rot the same way.
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    # run-vcpkg points VCPKG_BINARY_SOURCES at the GHA cache (x-gha), but the
    # ACTIONS_CACHE_URL/ACTIONS_RUNTIME_TOKEN env vars it needs aren't exposed
    # to plain shell steps — only to actions/github-script's Node process.
    - name: Export GHA cache credentials for vcpkg
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install SDL2 (vcpkg)
      run: |
        vcpkg install sdl2:x64-windows

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        arch: 'win64_msvc2022_64'

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        install_runtime: true
        cache: true

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: |
        cmake --build build --config Release -j

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zeropoint-windows-x64
        path: |
          build/bin/Release/*.exe
          build/bin/Release/*.dll
        retention-days: 30

  build-windows-arm64:
    name: Windows Build (ARM64)
    # Native ARM64 runner — cross-compiling from an x64 host (via `-A ARM64`)
    # would need ARM64 Qt host-tool binaries and an ARM64 Vulkan SDK that
    # neither install-qt-action nor install-vulkan-sdk-action can produce
    # from an x64 host. Building natively sidesteps both problems.
    runs-on: windows-11-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # No vcpkgGitCommitId pin: this repo has no vcpkg.json, and the previous
    # pin (Nov 2023) had gone stale — MSYS2 mirrors had GC'd a package
    # version its era of the sdl2 port depended on, and its vcpkg-cmake
    # helper scripts predated solid arm64-windows toolchain detection.
    # Floating to vcpkg's current default branch avoids re-pinning to
    # another commit that will eventually rot the same way.
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Export GHA cache credentials for vcpkg
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install SDL2 (vcpkg)
      run: |
        vcpkg install sdl2:arm64-windows

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        arch: 'win64_msvc2022_arm64'

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        install_runtime: true
        cache: true

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: |
        cmake --build build --config Release -j

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zeropoint-windows-arm64
        path: |
          build/bin/Release/*.exe
          build/bin/Release/*.dll
        retention-days: 30

  build-linux:
    name: Linux Build (x86_64)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libsdl2-dev \
          qt6-base-dev \
          qt6-base-dev-tools

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zeropoint-linux-x86_64
        path: build/bin/*
        retention-days: 30

  build-linux-arm64:
    name: Linux Build (ARM64)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          arm64v8/ubuntu:22.04 \
          bash -c "
            apt-get update && \
            apt-get install -y \
              build-essential \
              cmake \
              libsdl2-dev \
              libvulkan-dev \
              qt6-base-dev \
              qt6-base-dev-tools && \
            cmake -B build -DCMAKE_BUILD_TYPE=Release && \
            cmake --build build -j\$(nproc)
          "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zeropoint-linux-arm64
        path: build/bin/*
        retention-days: 30

  build-macos-intel:
    name: macOS Build (Intel x86_64)
    # GitHub retired free-tier Intel macOS hosted runners (macos-13 no longer
    # schedules — confirmed by a 24h queue timeout). The remaining Intel
    # labels (macos-15-intel etc.) are billed "Larger Runners", not enabled
    # on this repo. Instead: cross-compile x86_64 on a normal Apple Silicon
    # runner using a Rosetta-based x86_64 Homebrew. Experimental — x86_64
    # bottles for Qt/MoltenVK may not always be available; if this job is
    # flaky, it's a known tradeoff of this approach, not a regression.
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install x86_64 dependencies (Rosetta Homebrew)
      run: |
        softwareupdate --install-rosetta --agree-to-license
        arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        arch -x86_64 /usr/local/bin/brew install sdl2 qt vulkan-headers vulkan-loader molten-vk

    # cmake itself stays the native arm64 binary (Rosetta only translates
    # x86_64 -> arm64, not the reverse, so `arch -x86_64 cmake` can't even
    # exec it). Xcode's clang is a universal binary, so passing
    # -DCMAKE_OSX_ARCHITECTURES=x86_64 is enough to make it emit and link
    # x86_64 object code against the x86_64 Homebrew libs on CMAKE_PREFIX_PATH.
    - name: Configure CMake (cross x86_64)
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES=x86_64 \
          -DCMAKE_PREFIX_PATH="/usr/local;/usr/local/opt/qt"

    - name: Build
      run: |
        cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zeropoint-macos-intel
        path: build/bin/*
        retention-days: 30

  build-macos-arm64:
    name: macOS Build (Apple Silicon ARM64)
    runs-on: macos-15  # Apple Silicon runner (macos-14 is deprecated)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install sdl2 qt cmake vulkan-headers vulkan-loader molten-vk

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix qt)"

    - name: Build
      run: |
        cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zeropoint-macos-arm64
        path: build/bin/*
        retention-days: 30

    - name: Test JIT (ARM64)
      run: |
        ./build/bin/test_cpu || true

  build-summary:
    name: Build Summary
    needs: [build-windows, build-windows-arm64, build-linux, build-linux-arm64, build-macos-intel, build-macos-arm64]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check build status
      run: |
        echo "================================"
        echo "    ZeroPoint Build Summary     "
        echo "================================"
        echo ""
        echo "Windows Builds:"
        echo "  x64:   ${{ needs.build-windows.result }}"
        echo "  ARM64: ${{ needs.build-windows-arm64.result }}"
        echo ""
        echo "Linux Builds:"
        echo "  x86_64: ${{ needs.build-linux.result }}"
        echo "  ARM64:  ${{ needs.build-linux-arm64.result }}"
        echo ""
        echo "macOS Builds:"
        echo "  Intel (x86_64):      ${{ needs.build-macos-intel.result }}"
        echo "  Apple Silicon (ARM64): ${{ needs.build-macos-arm64.result }}"
        echo ""
        echo "================================"
